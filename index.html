<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Direct Tyres Limited</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
        transition: all 0.3s;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background: #0b0b0b;
        color: #fff;
        overflow-x: hidden;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 40px;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(14px);
      }
      header h1 {
        color: #ff1a1a;
      }
      nav {
        display: flex;
        gap: 20px;
      }
      nav a {
        color: #fff;
        text-decoration: none;
        position: relative;
      }
      nav a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        width: 0;
        height: 2px;
        background: #ff1a1a;
        transition: 0.3s;
      }
      nav a:hover::after {
        width: 100%;
      }

      .hamburger {
        display: none;
        flex-direction: column;
        cursor: pointer;
      }
      .hamburger div {
        width: 25px;
        height: 3px;
        background: #fff;
        margin: 4px 0;
        transition: 0.4s;
      }

      .hero {
        height: 90vh;
        background: url("https://images.unsplash.com/photo-1493238792000-8113da705763")
          center/cover no-repeat;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      .hero h2 {
        font-size: 3rem;
      }
      .hero p {
        margin: 15px 0;
      }

      .btn {
        padding: 12px 25px;
        margin: 5px;
        border: none;
        cursor: pointer;
        background: #ff1a1a;
        color: #fff;
        border-radius: 6px;
      }
      .btn.secondary {
        background: transparent;
        border: 1px solid #ff1a1a;
      }
      .btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 10px 25px rgba(255, 0, 0, 0.6);
      }

      .section {
        padding: 70px 40px;
      }
      .section h2 {
        text-align: center;
        margin-bottom: 25px;
        position: relative;
      }
      .section h2::after {
        content: "";
        width: 60px;
        height: 3px;
        background: #ff1a1a;
        position: absolute;
        bottom: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 2px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }
      .card {
        background: #161616;
        padding: 20px;
        border-radius: 12px;
        transition: 0.4s;
        cursor: pointer;
      }
      .card:hover {
        transform: translateY(-8px) scale(1.04);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
      }
      .card img {
        width: 100%;
        border-radius: 10px;
        margin-bottom: 10px;
        transition: 0.3s;
      }
      .card:hover img {
        transform: scale(1.05) rotateZ(1deg);
      }
      .icon {
        font-size: 25px;
        margin-bottom: 10px;
        color: #ff1a1a;
      }

      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .search-box input {
        padding: 10px;
        border: none;
        border-radius: 5px;
        width: 100%;
        background: #222;
        color: #fff;
      }
      .filter-buttons {
        text-align: center;
        margin-bottom: 20px;
      }
      .filter-buttons button {
        margin: 5px;
        padding: 8px 15px;
        border: none;
        background: #222;
        color: #fff;
        border-radius: 5px;
        cursor: pointer;
      }
      .filter-buttons button.active,
      .filter-buttons button:hover {
        background: #ff1a1a;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }
      .gallery-card {
        background: #161616;
        border-radius: 12px;
        overflow: hidden;
        transition: 0.4s;
      }
      .gallery-card img {
        width: 100%;
        display: block;
        transition: 0.3s;
      }
      .gallery-card:hover {
        transform: translateY(-10px) scale(1.06);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.85);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.95);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 2000;
      }
      .modal img {
        max-width: 90%;
        max-height: 80%;
        border-radius: 10px;
      }
      .modal.show {
        display: flex;
      }

      .counter {
        font-size: 2rem;
        color: #ff1a1a;
      }

      footer {
        text-align: center;
        padding: 40px 20px;
        background: #000;
      }

      .whatsapp-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #25d366;
        color: #fff;
        padding: 16px;
        border-radius: 50%;
        font-size: 26px;
        z-index: 3000;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
      }
      .whatsapp-float:hover {
        transform: scale(1.1);
      }

      .fade-in {
        opacity: 0;
        transform: translateY(20px);
        transition: 0.6s;
      }
      .fade-in.show {
        opacity: 1;
        transform: translateY(0);
      }

      /* ===== Mobile ===== */
      @media (max-width: 768px) {
        header {
          flex-direction: row;
          justify-content: space-between;
          align-items: center;
          padding: 15px 20px;
        }
        nav {
          display: none;
          flex-direction: column;
          gap: 10px;
          width: 100%;
        }
        nav.show {
          display: flex;
        }
        .hamburger {
          display: flex;
        }
        .hero h2 {
          font-size: 2rem;
        }
        .hero p {
          font-size: 1rem;
        }
        .btn {
          padding: 10px 18px;
          font-size: 0.9rem;
        }
        .grid,
        .gallery-grid {
          grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        }
        .section {
          padding: 50px 20px;
        }
        .whatsapp-float {
          bottom: 15px;
          right: 15px;
          padding: 14px;
          font-size: 24px;
        }
      }
      @media (max-width: 480px) {
        .hero h2 {
          font-size: 1.5rem;
        }
        .hero p {
          font-size: 0.9rem;
        }
        .btn {
          padding: 8px 14px;
          font-size: 0.8rem;
        }
        .search-box {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Direct Tyres</h1>
      <div class="hamburger" onclick="toggleMenu()">
        <div></div>
        <div></div>
        <div></div>
      </div>
      <nav id="navLinks">
        <a href="#products">Products</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <section class="hero">
      <h2>Premium Tyres, Rims & Batteries</h2>
      <p>Trusted quality. Maximum performance.</p>
      <div>
        <a href="tel:+254790909295" class="btn">Call Now</a>
        <a href="https://wa.me/254790909295" class="btn">WhatsApp</a>
        <a href="#products" class="btn secondary">Shop Now</a>
      </div>
    </section>

    <!-- Products / Gallery / Services / Impact ... same as before ... -->

    <!-- Contact Section with functional links -->
    <section class="section fade-in" id="contact">
      <h2>Contact Us</h2>
      <div class="grid">
        <div class="card">
          <i class="fas fa-phone icon"></i>
          <h3>
            <a
              href="tel:+254790909295"
              style="color: #fff; text-decoration: none"
              >Call Us</a
            >
          </h3>
        </div>
        <div class="card">
          <i class="fab fa-whatsapp icon"></i>
          <h3>
            <a
              href="https://wa.me/254790909295"
              target="_blank"
              style="color: #fff; text-decoration: none"
              >WhatsApp</a
            >
          </h3>
        </div>
        <div class="card">
          <i class="fas fa-map-marker-alt icon"></i>
          <h3>
            <a
              href="https://maps.app.goo.gl/f5HYt12ejpX5M8S89"
              target="_blank"
              style="color: #fff; text-decoration: none"
            >
              <p>
                Visit us in Kenya along Ngong Rd, Posta Opposite Telkom, next to
                Liquor Rituals
              </p></a
            >
          </h3>
        </div>
      </div>
    </section>

    <!-- Modal -->
    <div class="modal" id="modal" onclick="closeModal()">
      <img id="modalImg" />
    </div>

    <a href="https://wa.me/254790909295" class="whatsapp-float"
      ><i class="fab fa-whatsapp"></i
    ></a>

    <footer><p>© 2026 Direct Tyres Limited</p></footer>

    <script>
      // Hamburger toggle
      function toggleMenu() {
        document.getElementById("navLinks").classList.toggle("show");
      }

      // Fade-in
      const faders = document.querySelectorAll(".fade-in");
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add("show");
          }
        });
      });
      faders.forEach((el) => observer.observe(el));

      // Modal
      function openModal(card) {
        document.getElementById("modal").classList.add("show");
        document.getElementById("modalImg").src = card.querySelector("img").src;
      }
      function closeModal() {
        document.getElementById("modal").classList.remove("show");
      }

      // Counters
      const counters = document.querySelectorAll(".counter");
      counters.forEach((counter) => {
        counter.innerText = "0";
        const update = () => {
          const target = +counter.getAttribute("data-target");
          const c = +counter.innerText;
          const inc = target / 100;
          if (c < target) {
            counter.innerText = Math.ceil(c + inc);
            setTimeout(update, 20);
          } else counter.innerText = target;
        };
        update();
      });

      // Product filter/search
      function filterProducts(type) {
        document.querySelectorAll("#productGrid .card").forEach((card) => {
          card.style.display =
            type === "all" || card.classList.contains(type) ? "block" : "none";
        });
      }
      function searchProduct() {
        let val = document.getElementById("searchInput").value.toLowerCase();
        document.querySelectorAll("#productGrid .card").forEach((card) => {
          card.style.display = card.innerText.toLowerCase().includes(val)
            ? "block"
            : "none";
        });
      }
    </script>
  </body>
</html>
